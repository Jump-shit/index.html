<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心怡外卖点单页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: pink;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .container {
      padding: 15px;
    }
    .item {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .item img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
    }
    .info {
      flex: 1;
    }
    .item button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
    .cart {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      padding: 15px;
      border-top: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }
    .cart button {
      background: #ff6600;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>给心怡点单 🍜</header>

<div class="container" id="menu"></div>

<div class="cart">
  <div>总价: ￥<span id="total">0</span></div>
  <button onclick="checkout()">下单 ❤️</button>
</div>

<script>
  const foods = [
    { name: "奶茶", price: 15, priceText: "黄浩付钱", desc: "香甜顺滑", img:"Screenshot 2026-03-29 at 4.26.37 PM.png" },
    { name: "炸鸡", price: 25, priceText: "黄浩付钱", desc: "外酥里嫩好吃", img: "Screenshot 2026-03-29 at 4.37.00 PM.png" },
    { name: "寿司", price: 30, priceText: "黄浩付钱", desc: "超好吃", img: "Screenshot 2026-03-29 at 4.39.13 PM.png" },
    { name: "火锅", price: 60, priceText: "黄浩付钱", desc: "好吃", img: "Screenshot 2026-03-29 at 4.39.54 PM.png" },
    { name: "蛋糕", price: 45, priceText: "黄浩付钱", desc: "好甜哈饿饿", img: "Screenshot 2026-03-29 at 4.41.14 PM.png" },
    { name: "水果", price: 20, priceText: "黄浩付钱", desc: "健康噢", img: "Screenshot 2026-03-29 at 4.41.59 PM.png" }
  ];

  let total = 0;

  const menuDiv = document.getElementById("menu");

  foods.forEach(food => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${food.img}" alt="${food.name}">
      <div class="info">
        <div><strong>${food.name}</strong> - ${food.priceText}</div>
        <div style="font-size: 14px; color: #666;">${food.desc}</div>
      </div>
      <button onclick="addToCart(${food.price})">+</button>
    `;
    menuDiv.appendChild(div);
  });

  function addToCart(price) {
    total += price;
    document.getElementById("total").innerText = total;
  }

  function checkout() {
    alert("已帮你点单啦 ❤️\n总价: ￥" + total);
  }
</script>

</body>
</html>
